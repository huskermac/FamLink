<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamLink — Architecture</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf8;color:#1a1a18;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e5e3da;padding:10px 20px;display:flex;align-items:center;gap:12px}
#back{background:#f1efe8;border:1px solid #d3d1c7;border-radius:6px;padding:4px 12px;font-size:13px;cursor:pointer;display:none}
#back:hover{background:#e8e6de}
#bc{font-size:13px;color:#888;flex:1}
#bc span{color:#1a1a18;font-weight:500}
#bc a{color:#534AB7;text-decoration:none}
#bc a:hover{text-decoration:underline}
#hint{font-size:12px;color:#999;padding:8px 20px 0;min-height:20px}
main{padding:20px;max-width:740px;margin:0 auto}
main svg{display:block;width:100%;height:auto}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
svg .t{font-size:14px;font-weight:500}
svg .ts{font-size:12px;font-weight:400}
svg .tn{font-size:11px;font-style:italic}
g.cl{cursor:pointer}
g.cl:hover>rect{filter:brightness(0.88)}
</style>
</head>
<body>
<header>
  <button id="back" onclick="navBack()">← Back</button>
  <div id="bc"></div>
</header>
<p id="hint"></p>
<main id="d"></main>

<script>
// ── Palette ────────────────────────────────────────────────────────────
const P = {
  purple:['#EEEDFE','#534AB7','#3C3489','#534AB7'],
  teal:  ['#E1F5EE','#0F6E56','#085041','#0F6E56'],
  gray:  ['#F1EFE8','#888780','#444441','#5F5E5A'],
  amber: ['#FAEEDA','#854F0B','#633806','#854F0B'],
  blue:  ['#E6F1FB','#185FA5','#0C447C','#185FA5'],
  coral: ['#FAECE7','#993C1D','#712B13','#993C1D'],
};

// ── Primitives ─────────────────────────────────────────────────────────
const DEFS = `<defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

function bx(x,y,w,h,p,title,sub,onclick){
  const [bg,sk,tc,sc]=P[p];
  const cl=onclick?` class="cl" onclick="${onclick}"`:'';
  const ty=sub?y+Math.round(h*0.35):y+Math.round(h/2);
  const sy=y+Math.round(h*0.68);
  return `<g${cl}><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${bg}" stroke="${sk}" stroke-width="0.5"/>
    <text class="t" fill="${tc}" x="${x+Math.round(w/2)}" y="${ty}" text-anchor="middle" dominant-baseline="central">${title}</text>
    ${sub?`<text class="ts" fill="${sc}" x="${x+Math.round(w/2)}" y="${sy}" text-anchor="middle" dominant-baseline="central">${sub}</text>`:''}
  </g>`;
}
const ar=(x1,y1,x2,y2,c='#bbb')=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>`;
const ln=(x1,y1,x2,y2,c='#ccc')=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="1.5" fill="none"/>`;
const zn=(x,y,w,h,lbl,onclick)=>{
  const cl=onclick?` class="cl" onclick="${onclick}"`:'';
  return `<g${cl}><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="12" fill="none" stroke="#c8c6be" stroke-width="0.8" stroke-dasharray="6 3"/>
    <text class="tn" fill="#aaa" x="${x+13}" y="${y+15}" dominant-baseline="central">${lbl}</text></g>`;
};
const nt=(x,y,txt,c='#aaa')=>`<text class="tn" fill="${c}" x="${x}" y="${y}" dominant-baseline="central">${txt}</text>`;
const tx=(x,y,txt,c,cls='ts',anchor='middle')=>`<text class="${cls}" fill="${c}" x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="central">${txt}</text>`;

// ── Views ───────────────────────────────────────────────────────────────
const VIEWS = {

// ── HOME ─────────────────────────────────────────────────────────────

  label:'System architecture',
  hint:'Click any service marked › to drill into detail.',
  svg(){return `<svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">${DEFS}

  ${tx(519,13,'External services','#bbb')}
  ${bx(20,22,150,44,'gray','Web browser','Next.js app')}
  ${bx(188,22,150,44,'gray','Mobile app','Expo / React Native')}
  ${ar(160,66,160,80)}
  ${zn(20,80,320,76,'Vercel')}
  ${bx(110,96,160,52,'purple','Next.js 14','App Router · SSR')}
  ${ar(160,156,160,174)}
  ${zn(20,174,320,178,'Railway  ›','go(\'railway\')')}
  ${bx(40,198,148,52,'purple','Express API','Node.js + TypeScript','go(\'railway\')')}
  ${bx(40,268,130,52,'purple','PostgreSQL','Primary database','go(\'railway\')')}
  ${bx(188,268,130,52,'purple','Redis','Cache + sessions','go(\'railway\')')}
  ${ar(160,352,160,370)}
  ${bx(80,370,160,44,'gray','GitHub Actions','CI/CD pipeline')}
  ${ar(342,108,380,108)}
  ${ar(342,224,380,224)}
  ${ar(342,300,380,300)}
  ${ar(342,354,380,354)}
  ${bx(382,80,276,56,'teal','Clerk  ›','Auth · OAuth · guest tokens','go(\'clerk\')')}
  ${bx(382,152,276,44,'teal','Resend  ›','Transactional email','go(\'notifications\')')}
  ${bx(382,212,276,44,'teal','Twilio  ›','SMS delivery','go(\'notifications\')')}
  ${bx(382,272,276,44,'teal','Firebase FCM  ›','Push notifications','go(\'notifications\')')}
  ${bx(382,332,276,44,'teal','Anthropic Claude  ›','AI primary — Sonnet','go(\'ai\')')}
  ${bx(382,392,276,44,'teal','OpenAI GPT-4o  ›','AI fallback model','go(\'ai\')')}
  <g opacity="0.35">
  ${bx(382,452,276,38,'gray','Cloudflare R2 — Phase 2','')}
  ${bx(382,498,276,38,'gray','Stripe — Phase 3','')}
  </g>
  </svg>`}
},

// ── CLERK ────────────────────────────────────────────────────────────

  </svg>`}
},

// ── RAILWAY ───────────────────────────────────────────────────────────

  label:'Railway — backend internals',
  hint:'Every request through the Express API passes this middleware stack in exact order.',
  svg(){
    const mwItems=[
      ['1.  cors','#5F5E5A','#F1EFE8','#e5e3da'],
      ['2.  helmet','#5F5E5A','#F1EFE8','#e5e3da'],
      ['3.  express.raw()  ← webhooks/clerk only','#854F0B','#FAEEDA','#854F0B'],
      ['4.  express.json()','#5F5E5A','#F1EFE8','#e5e3da'],
      ['5.  Morgan logger','#5F5E5A','#F1EFE8','#e5e3da'],
      ['6.  clerkAuth  ← makes auth context available','#534AB7','#EEEDFE','#534AB7'],
      ['7.  Routes  →  /api/v1/*','#085041','#E1F5EE','#0F6E56'],
      ['8.  404 handler','#5F5E5A','#F1EFE8','#e5e3da'],
      ['9.  errorHandler','#5F5E5A','#F1EFE8','#e5e3da'],
    ];
    const mwSvg=mwItems.map(([label,tc,bg,sk],i)=>{
      const y=50+i*26;
      return `<rect x="36" y="${y}" width="264" height="21" rx="4" fill="${bg}" stroke="${sk}" stroke-width="0.5"/>
        <text class="ts" fill="${tc}" x="46" y="${y+10}" dominant-baseline="central">${label}</text>`;
    }).join('');
    const routes=['/api/v1/persons','/api/v1/families  +  /households','/api/v1/relationships','/api/v1/events','/api/v1/calendar','/api/v1/guest/*   ← public, no auth','/api/v1/webhooks/clerk   ← Svix-verified'];
    const tables=['persons  (userId, ageGateLevel, guardianPersonId)','family_groups,  households','family_members,  household_members','relationships  (graph edges — RECIPROCAL_TYPES)','events,  event_invitations','rsvps,  potluck_assignments','notification_preferences'];
    const redis=['Session cache  (Clerk tokens)','AI rate limit counters  (20 queries / user / day)','API response cache','Socket.io adapter  (real-time layer)'];
    return `<svg viewBox="0 0 680 468" xmlns="http://www.w3.org/2000/svg">${DEFS}
    ${zn(20,16,300,300,'Express API  —  apps/api')}
    ${tx(170,36,'Middleware stack  (execution order)','#3C3489','t')}
    ${mwSvg}
    ${tx(170,302,'Route groups','#3C3489','t','middle')}
    ${routes.map((r,i)=>`<text class="ts" fill="#534AB7" x="38" y="${318+i*18}" dominant-baseline="central">${r}</text>`).join('')}

    ${zn(340,16,320,204,'PostgreSQL — core tables')}
    ${tx(500,36,'Prisma 5.16.0  (pinned)','#085041','t')}
    ${tables.map((t,i)=>`<text class="ts" fill="#0F6E56" x="354" y="${56+i*22}" dominant-baseline="central">${t}</text>`).join('')}

    ${zn(340,232,320,84,'Redis')}
    ${tx(500,250,'Usage','#633806','t')}
    ${redis.map((r,i)=>`<text class="ts" fill="#854F0B" x="354" y="${268+i*18}" dominant-baseline="central">${r}</text>`).join('')}

    ${zn(20,334,640,80,'Socket.io — real-time layer  (MVP)')}
    ${bx(40,352,192,46,'purple','AI streaming','word-by-word responses')}
    ${bx(256,352,190,46,'teal','Live RSVP updates','organiser dashboard')}
    ${bx(466,352,168,46,'gray','Stream.io — Phase 2','full family chat')}

    ${zn(20,426,640,36,'Phase 2+')}
    ${nt(34,444,'Cloudflare R2 (media storage)   ·   Stripe (subscriptions)   ·   Neo4j / AWS Neptune (graph DB evaluation)','#bbb')}
    </svg>`;
  }
},

// ── NOTIFICATIONS ─────────────────────────────────────────────────────
notifications:{
  label:'Notification service',
  hint:'All three channels are required at MVP. Preference enforcement runs before every send — a disabled channel is silently skipped.',
  svg(){return `<svg viewBox="0 0 680 348" xmlns="http://www.w3.org/2000/svg">${DEFS}
  ${tx(340,13,'Trigger events','#bbb')}
  ${bx(20,20,140,44,'gray','Event created','')}
  ${bx(178,20,140,44,'gray','RSVP received','')}
  ${bx(336,20,140,44,'gray','Birthday reminder','')}
  ${bx(494,20,162,44,'gray','Weekly digest','')}
  ${ln(90,64,90,74)} ${ln(248,64,248,74)} ${ln(406,64,406,74)} ${ln(575,64,575,74)}

  ${tx(340,196,'SMS — 160 char limit','#854F0B','ts')}

  <rect x="450" y="162" width="210" height="96" rx="8" fill="${P.blue[0]}" stroke="${P.blue[1]}" stroke-width="0.5"/>
  ${tx(555,180,'Firebase FCM','#0C447C','t')}

  ${nt(464,250,'→ Organizer  ✦✦  Co-Parent  ✦✦','#0C447C')}

  ${zn(20,272,640,66,'Preference enforcement — NotificationPreference table')}
  ${nt(34,292,'Each user controls their own preferences per channel. notificationService.ts checks before every send.','#888')}

},

// ── AI ────────────────────────────────────────────────────────────────
ai:{
  label:'AI provider routing',
  hint:'Vercel AI SDK abstracts all model providers. Swap models without changing application code.',
  svg(){return `<svg viewBox="0 0 680 404" xmlns="http://www.w3.org/2000/svg">${DEFS}
  ${bx(250,20,180,52,'gray','User query','/api/v1/assistant/chat')}
  ${ar(340,72,340,92)}

  ${zn(20,92,640,114,'Context assembler — family data injected into every AI request')}
  ${bx(36,110,144,78,'teal','Family graph','members · relationships')}
  ${bx(196,110,144,78,'teal','Upcoming events','next 30 days')}

  ${bx(446,356,196,44,'gray','Haiku / GPT-4o-mini','bulk · proactive · drafts')}

  ${zn(20,314,640,26,'')}
  ${nt(20,386,'Rate limit: 20 AI queries / user / day (beta) · Max iteration limits on all agentic calls · No recursive tool calls · Propose-confirm for all actions','#ccc')}
  </svg>`}
}

};

// ── Navigation ───────────────────────────────────────────────────────
let stack=['home'];
function go(id){if(VIEWS[id]){stack.push(id);render();}}
function navBack(){if(stack.length>1){stack.pop();render();}}
function render(){
  const id=stack[stack.length-1];
  const v=VIEWS[id];
  document.getElementById('d').innerHTML=v.svg();
  document.getElementById('hint').textContent=v.hint||'';
  const bc=document.getElementById('bc');
  bc.innerHTML=stack.map((sid,i)=>{
    const lbl=VIEWS[sid].label;
    if(i===stack.length-1) return `<span>${lbl}</span>`;
    return `<a href="#" onclick="stack=stack.slice(0,${i+1});render();return false">${lbl}</a> ›`;
  }).join(' ');
  document.getElementById('back').style.display=stack.length>1?'':'none';
}
window.go=go;
render();
</script>
</body>
</html>

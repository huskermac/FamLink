<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamLink — Architecture</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf8;color:#1a1a18;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e5e3da;padding:10px 20px;display:flex;align-items:center;gap:12px}
#back{background:#f1efe8;border:1px solid #d3d1c7;border-radius:6px;padding:4px 12px;font-size:13px;cursor:pointer;display:none}
#back:hover{background:#e8e6de}
#bc{font-size:13px;color:#888;flex:1}
#bc span{color:#1a1a18;font-weight:500}
#bc a{color:#534AB7;text-decoration:none}
#bc a:hover{text-decoration:underline}
#hint{font-size:12px;color:#999;padding:8px 20px 4px;min-height:24px;max-width:780px;margin:0 auto;line-height:1.5;transition:all 0.15s}
#hint.active{font-size:13px;color:#333;background:#f3f1e8;border:1px solid #dddad0;border-radius:7px;padding:10px 14px;margin:8px 20px 0}
main{padding:16px 20px 20px;max-width:740px;margin:0 auto}
main svg{display:block;width:100%;height:auto}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
svg .t{font-size:14px;font-weight:500}
svg .ts{font-size:12px;font-weight:400}
svg .tn{font-size:11px;font-style:italic}
g.cl{cursor:pointer}
g.cl:hover>rect{filter:brightness(0.88)}
</style>
</head>
<body>
<header>
  <button id="back" onclick="navBack()">← Back</button>
  <div id="bc"></div>
</header>
<p id="hint"></p>
<main id="d"></main>

<script>
// ── Palette ─────────────────────────────────────────────────────────────
const P = {
  purple:['#EEEDFE','#534AB7','#3C3489','#534AB7'],
  teal:  ['#E1F5EE','#0F6E56','#085041','#0F6E56'],
  gray:  ['#F1EFE8','#888780','#444441','#5F5E5A'],
  amber: ['#FAEEDA','#854F0B','#633806','#854F0B'],
  blue:  ['#E6F1FB','#185FA5','#0C447C','#185FA5'],
  coral: ['#FAECE7','#993C1D','#712B13','#993C1D'],
};

// ── Descriptions (hover to reveal) ──────────────────────────────────────
const DESCS = {
  // Home
  'web-browser':   {t:'Web browser',           b:'The famlink.com website. Pages are rendered on the server before reaching your browser — similar to how ColdFusion generates HTML before sending it to the user.'},
  'mobile-app':    {t:'Mobile app',            b:'The iOS/Android app built with Expo/React Native. Uses the same JavaScript codebase as the website but renders native mobile controls. Talks directly to the Express API — no web layer in between.'},
  'nextjs':        {t:'Next.js 14',            b:'The server-side web layer hosted on Vercel. Handles routing and page rendering — like ColdFusion\'s Application.cfc combined with your .cfm templates, but for React components.'},
  'express':       {t:'Express API',           b:'The backend engine — every request from web or mobile passes through here first. Like Application.cfc in ColdFusion: manages routing, authentication checks, validation, and database access.'},
  'postgres':      {t:'PostgreSQL',            b:'Your primary relational database. Stores all persistent data: users, families, events, RSVPs, relationships. Same concept as CF datasources — PostgreSQL is just the database engine.'},
  'redis':         {t:'Redis',                 b:'Fast in-memory data store — like ColdFusion\'s Application scope. Stores session tokens, AI rate limit counters (20/user/day), and cached API responses for instant retrieval without hitting the database.'},
  'gh-actions':    {t:'GitHub Actions',        b:'Automated CI/CD pipeline. When you push code to GitHub, Actions runs your test suite and deploys to Vercel and Railway automatically — no manual deploy steps needed.'},
  'clerk':         {t:'Clerk',                 b:'Handles all authentication externally: Google/Apple sign-in, session management, and the guest token system for Reluctant Members. No custom login code to write or maintain.'},
  'resend':        {t:'Resend',                b:'Transactional email service. Sends invitations, RSVP confirmations, birthday reminders, and weekly digests. Like cfmail in ColdFusion but as a managed service with delivery guarantees.'},
  'twilio':        {t:'Twilio',                b:'SMS messaging service. Powers the one-click RSVP links — family members can respond without creating an account. Critical for the Reluctant Member (Uncle Dave) persona.'},
  'firebase':      {t:'Firebase FCM',          b:'Push notification delivery to iOS and Android devices. Sends real-time alerts when events are created or RSVPs received. Most valuable for Organizer and Co-Parent personas.'},
  'anthropic':     {t:'Anthropic Claude',      b:'Primary AI model (Claude Sonnet). Powers the FamLink assistant with full family context injected on every call: who\'s connected, upcoming events, pending RSVPs, member preferences.'},
  'openai':        {t:'OpenAI GPT-4o',         b:'Fallback AI model. Used if Claude is unavailable or for faster, lower-cost tasks. The Vercel AI SDK lets you swap models without changing any application code.'},
  // Clerk detail
  'ck-browser':    {t:'Browser sign-up',       b:'User fills out the Clerk-hosted sign-up form. Clerk creates the account, then immediately calls your API server-to-server to create a matching Person record in your PostgreSQL database.'},
  'ck-webhook':    {t:'Webhook endpoint',      b:'A server-to-server call — Clerk\'s servers POST directly to your Express API, bypassing the browser entirely. Your API verifies the call is genuine using CLERK_WEBHOOK_SECRET before processing it.'},
  'ck-svix':       {t:'Svix.verify()',          b:'Clerk signs every webhook payload using Svix. Your API calls Svix.verify() to confirm the payload is genuinely from Clerk — not a spoofed request from another source.'},
  'ck-person':     {t:'Person upsert',         b:'Creates or updates the Person record in your database. Sets ageGateLevel to NONE by default. This is how your app tracks users beyond what Clerk itself stores.'},
  'ck-global-mw':  {t:'clerkAuth middleware',  b:'Global middleware that runs before every request — like Application.cfc onRequestStart() in ColdFusion. Decodes the Clerk JWT and attaches userId to the request object if a valid token is present.'},
  'ck-require-mw': {t:'requireAuth middleware',b:'Route-level guard. Checks that userId exists on the request — if not, returns 401 Unauthorized. Like a ColdFusion component that throws an exception when the user isn\'t logged in.'},
  'ck-guest-gen':  {t:'generateGuestToken',    b:'Creates a signed 48-hour JWT tied to a specific person + event combination. No Clerk account needed — just a link. This is the mechanism that lets Uncle Dave RSVP without signing up.'},
  'ck-guest-mw':   {t:'requireGuestToken',     b:'Validates the guest token on public RSVP routes using a separate GUEST_TOKEN_SECRET (completely separate from Clerk keys). Attaches guest identity to req.guest so the route handler knows who\'s responding.'},
  // Railway detail
  'rw-cors':       {t:'cors',                  b:'Controls which domains can make requests to your API. Blocks calls from unauthorized origins — prevents other websites from silently calling your backend on a user\'s behalf.'},
  'rw-helmet':     {t:'helmet',                b:'Sets HTTP security headers automatically. Prevents common browser-based attacks (clickjacking, MIME sniffing) with a single line — free security hardening with no custom code.'},
  'rw-raw':        {t:'express.raw()',          b:'Parses Clerk webhook requests as raw bytes before any other processing. Required because Svix signature verification needs the original unmodified payload — not a parsed JSON object.'},
  'rw-json':       {t:'express.json()',         b:'Parses all other request bodies from JSON into JavaScript objects. Like ColdFusion automatically making form fields available in the FORM scope — after this, req.body is ready to use.'},
  'rw-morgan':     {t:'Morgan logger',         b:'Logs every HTTP request to the console: method, URL, status code, response time. Helpful for spotting slow endpoints and debugging unexpected errors during development.'},
  'rw-clerk-mw':   {t:'clerkAuth',             b:'Makes Clerk auth context available on every request. Doesn\'t block unauthenticated calls — just attaches userId if a valid token is present. The requireAuth middleware does the actual blocking downstream.'},
  'rw-routes':     {t:'Route groups',          b:'7 route groups at MVP, each handling a feature area. Like separate ColdFusion .cfc components — each handles one resource type (persons, events, RSVPs, etc.).'},
  'rw-404':        {t:'404 handler',           b:'Catches any request that didn\'t match a defined route. Returns a clean JSON 404 response instead of an Express default error page — consistent error format for the client.'},
  'rw-error':      {t:'errorHandler',          b:'Global error handler — the last middleware in the chain. Catches any unhandled errors and returns a consistent JSON error format so the client always gets a predictable, parseable response.'},
  'rw-postgres':   {t:'PostgreSQL core tables',b:'7 tables at MVP accessed via Prisma ORM: persons, family_groups, households, relationships (the graph edges), events, invitations, rsvps, potluck_assignments, notification_preferences.'},
  'rw-redis':      {t:'Redis',                 b:'4 uses at MVP: Clerk session cache, AI rate limit counters (20 queries/user/day), API response cache, and the Socket.io adapter for broadcasting real-time events across server instances.'},
  'rw-ai-stream':  {t:'AI streaming',          b:'Streams AI responses word-by-word via Socket.io as they\'re generated. The assistant feels responsive rather than making users stare at a spinner waiting for the complete response.'},
  'rw-rsvp-live':  {t:'Live RSVP updates',     b:'Pushes RSVP count changes to the organizer\'s dashboard in real time via Socket.io. No page refresh needed — the tally updates the moment a family member responds.'},
  'rw-stream-io':  {t:'Stream.io (Phase 2)',   b:'Full family group chat — deferred until after MVP. For MVP, Socket.io handles only AI response streaming and live RSVP dashboard updates.'},
  // Notifications detail
  'nf-event':      {t:'Event created',         b:'Triggered when an organizer saves a new event. Kicks off the invitation flow — notifies all invited members via their preferred channels (email, SMS, push).'},
  'nf-rsvp':       {t:'RSVP received',         b:'Triggered when a family member responds to an event. Notifies the organizer in real time and optionally sends a confirmation to the person who RSVPed.'},
  'nf-birthday':   {t:'Birthday reminder',     b:'Auto-generated reminders from the birthday calendar — sent 7 days before and day-of. Delivery based on each member\'s notification preferences.'},
  'nf-digest':     {t:'Weekly digest',         b:'Scheduled Sunday morning summary of upcoming family events. Critical for Grandparent and Reluctant Member personas who won\'t proactively open the app.'},
  'nf-service':    {t:'Notification service',  b:'The coordinator for all notification sends. Before every send it checks the user\'s NotificationPreference record. Disabled channels are silently skipped — partial delivery (e.g. email only) is a valid, expected outcome.'},
  'nf-resend':     {t:'Resend — email',        b:'Primary channel for Grandparent and Reluctant Member personas — everyone has email. Handles invitations, RSVP confirmations, digests, and birthday reminders.'},
  'nf-twilio':     {t:'Twilio — SMS',          b:'160-character limit means messages are short and action-focused — typically just a link. Most critical for Reluctant Member: zero-friction RSVP without needing an account or the app.'},
  'nf-fcm':        {t:'Firebase FCM — push',   b:'Real-time push alerts to iOS and Android. Most valuable for Organizer and Co-Parent — people who want instant awareness of RSVP activity without checking the app manually.'},
  'nf-prefs':      {t:'Preference enforcement',b:'NotificationPreference table: one row per user, three boolean flags (email, SMS, push). Default is all three enabled. Checked before every send — the system never overrides a user\'s choice.'},
  // AI detail
  'ai-query':      {t:'User query',            b:'A question or request sent to POST /api/v1/assistant/chat. The raw query is never sent to the AI alone — family context is assembled from the database and injected into the prompt first.'},
  'ai-graph':      {t:'Family graph',          b:'Members, relationship types, and household data pulled from PostgreSQL and injected into the AI prompt. The model knows who\'s in the family before generating a response.'},
  'ai-events':     {t:'Upcoming events',       b:'Next 30 days of events and invitation status fetched from the database. The AI sees who\'s been invited, who\'s RSVPed, and what\'s still outstanding — all before it reads your question.'},
  'ai-pending':    {t:'Pending actions',       b:'Open items: unresponded RSVPs, overdue potluck assignments, unacknowledged invitations. The AI can proactively surface these without being asked.'},
  'ai-prefs':      {t:'Preferences',           b:'User notification preferences and family settings. The AI respects these when suggesting actions — e.g. won\'t recommend SMS for a user who has SMS disabled.'},
  'ai-sdk':        {t:'Vercel AI SDK',         b:'An abstraction layer that lets your code talk to any AI model through a single interface — like a ColdFusion datasource that works with multiple database engines. Swap Claude for GPT-4o without changing application code.'},
  'ai-router':     {t:'Model router',          b:'Selects the right model per request: Claude Sonnet for complex family tasks, GPT-4o as fallback, Haiku/GPT-4o-mini for bulk operations and draft generation.'},
  'ai-sonnet':     {t:'Claude Sonnet',         b:'Primary model. Best for complex, context-rich tasks: drafting invitations, summarizing RSVP status, answering questions about family relationships. Full family context injected on every call.'},
  'ai-gpt4o':      {t:'GPT-4o',                b:'Fallback model. Used when Claude is unavailable or when response speed matters more than maximum reasoning depth. Comparable quality for most family assistant tasks.'},
  'ai-mini':       {t:'Haiku / GPT-4o-mini',   b:'Lightweight, fast, low-cost models for high-volume tasks: generating reminder drafts, batch suggestions, proactive nudges. Prioritizes speed and cost over maximum capability.'},
};

// ── Primitives ───────────────────────────────────────────────────────────
const DEFS = `<defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

function bx(x,y,w,h,p,title,sub,onclick,desc){
  const [bg,sk,tc,sc]=P[p];
  const hasInteract=onclick||desc;
  const cl=hasInteract?' class="cl"':'';
  const oc=onclick?` onclick="${onclick}"`:'';
  const de=desc?` onmouseenter="showInfo('${desc}')" onmouseleave="hideInfo()"`:'';
  const ty=sub?y+Math.round(h*0.35):y+Math.round(h/2);
  const sy=y+Math.round(h*0.68);
  return `<g${cl}${oc}${de}><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${bg}" stroke="${sk}" stroke-width="0.5"/>
    <text class="t" fill="${tc}" x="${x+Math.round(w/2)}" y="${ty}" text-anchor="middle" dominant-baseline="central">${title}</text>
    ${sub?`<text class="ts" fill="${sc}" x="${x+Math.round(w/2)}" y="${sy}" text-anchor="middle" dominant-baseline="central">${sub}</text>`:''}
  </g>`;
}
const ar=(x1,y1,x2,y2,c='#bbb')=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>`;
const ln=(x1,y1,x2,y2,c='#ccc')=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="1.5" fill="none"/>`;
const zn=(x,y,w,h,lbl,onclick,desc)=>{
  const hasInteract=onclick||desc;
  const cl=hasInteract?' class="cl"':'';
  const oc=onclick?` onclick="${onclick}"`:'';
  const de=desc?` onmouseenter="showInfo('${desc}')" onmouseleave="hideInfo()"`:'';
  return `<g${cl}${oc}${de}><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="12" fill="none" stroke="#c8c6be" stroke-width="0.8" stroke-dasharray="6 3"/>
    <text class="tn" fill="#aaa" x="${x+13}" y="${y+15}" dominant-baseline="central">${lbl}</text></g>`;
};
const nt=(x,y,txt,c='#aaa')=>`<text class="tn" fill="${c}" x="${x}" y="${y}" dominant-baseline="central">${txt}</text>`;
const tx=(x,y,txt,c,cls='ts',anchor='middle')=>`<text class="${cls}" fill="${c}" x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="central">${txt}</text>`;

// ── Views ────────────────────────────────────────────────────────────────
const VIEWS = {

  svg(){return `<svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">${DEFS}
  ${tx(190,13,'Infrastructure','#bbb')}
  ${tx(519,13,'External services','#bbb')}

  ${bx(40,198,148,52,'purple','Express API','Node.js + TypeScript','go(\'railway\')','express')}
  ${bx(40,268,130,52,'purple','PostgreSQL','Primary database','go(\'railway\')','postgres')}

  ${ar(342,300,380,300)}
  ${ar(342,354,380,354)}
  ${bx(382,80,276,56,'teal','Clerk  ›','Auth · OAuth · guest tokens','go(\'clerk\')','clerk')}
  ${bx(382,152,276,44,'teal','Resend  ›','Transactional email','go(\'notifications\')','resend')}

  ${bx(382,272,276,44,'teal','Firebase FCM  ›','Push notifications','go(\'notifications\')','firebase')}

// ── RAILWAY ───────────────────────────────────────────────────────────
railway:{
  label:'Railway — backend internals',
  hint:'Every request passes through this Express middleware stack in exact order — like Application.cfc onRequestStart() running a checklist before each request reaches the route handler. Hover any item for details.',
  svg(){
    const mwItems=[
      ['1.  cors','#5F5E5A','#F1EFE8','#e5e3da','rw-cors'],
      ['2.  helmet','#5F5E5A','#F1EFE8','#e5e3da','rw-helmet'],
      ['3.  express.raw()  ← webhooks/clerk only','#854F0B','#FAEEDA','#854F0B','rw-raw'],
      ['4.  express.json()','#5F5E5A','#F1EFE8','#e5e3da','rw-json'],
      ['5.  Morgan logger','#5F5E5A','#F1EFE8','#e5e3da','rw-morgan'],
      ['6.  clerkAuth  ← makes auth context available','#534AB7','#EEEDFE','#534AB7','rw-clerk-mw'],
      ['7.  Routes  →  /api/v1/*','#085041','#E1F5EE','#0F6E56','rw-routes'],
      ['8.  404 handler','#5F5E5A','#F1EFE8','#e5e3da','rw-404'],
      ['9.  errorHandler','#5F5E5A','#F1EFE8','#e5e3da','rw-error'],
    ];
    const mwSvg=mwItems.map(([label,tc,bg,sk,desc],i)=>{
      const y=50+i*26;
      const de=desc?` onmouseenter="showInfo('${desc}')" onmouseleave="hideInfo()"`:''
      return `<g class="cl"${de}><rect x="36" y="${y}" width="264" height="21" rx="4" fill="${bg}" stroke="${sk}" stroke-width="0.5"/>
        <text class="ts" fill="${tc}" x="46" y="${y+10}" dominant-baseline="central">${label}</text></g>`;
    }).join('');
    const routes=['/api/v1/persons','/api/v1/families  +  /households','/api/v1/relationships','/api/v1/events','/api/v1/calendar','/api/v1/guest/*   ← public, no auth','/api/v1/webhooks/clerk   ← Svix-verified'];
    const tables=['persons  (userId, ageGateLevel, guardianPersonId)','family_groups,  households','family_members,  household_members','relationships  (graph edges — RECIPROCAL_TYPES)','events,  event_invitations','rsvps,  potluck_assignments','notification_preferences'];
    const redis=['Session cache  (Clerk tokens)','AI rate limit counters  (20 queries / user / day)','API response cache','Socket.io adapter  (real-time layer)'];
    return `<svg viewBox="0 0 680 468" xmlns="http://www.w3.org/2000/svg">${DEFS}
    ${zn(20,16,300,300,'Express API  —  apps/api')}
    ${tx(170,36,'Middleware stack  (execution order)','#3C3489','t')}
    ${mwSvg}
    ${tx(170,302,'Route groups','#3C3489','t','middle')}
    ${routes.map((r,i)=>`<text class="ts" fill="#534AB7" x="38" y="${318+i*18}" dominant-baseline="central">${r}</text>`).join('')}

    ${zn(340,16,320,204,'PostgreSQL — core tables',null,'rw-postgres')}
    ${tx(500,36,'Prisma 5.16.0  (pinned)','#085041','t')}
    ${tables.map((t,i)=>`<text class="ts" fill="#0F6E56" x="354" y="${56+i*22}" dominant-baseline="central">${t}</text>`).join('')}

// ── Info panel ───────────────────────────────────────────────────────────
function showInfo(key){
  const d=DESCS[key];
  if(!d) return;
  const h=document.getElementById('hint');
  h.innerHTML=`<strong>${d.t}:</strong> ${d.b}`;
  h.classList.add('active');
}
function hideInfo(){
  const id=stack[stack.length-1];
  const h=document.getElementById('hint');
  h.innerHTML=VIEWS[id].hint||'';
  h.classList.remove('active');
}

// ── Navigation ───────────────────────────────────────────────────────────
let stack=['home'];
function go(id){if(VIEWS[id]){stack.push(id);render();}}
function navBack(){if(stack.length>1){stack.pop();render();}}
function render(){
  const id=stack[stack.length-1];
  const v=VIEWS[id];
  document.getElementById('d').innerHTML=v.svg();
  document.getElementById('hint').textContent=v.hint||'';
  document.getElementById('hint').classList.remove('active');
  const bc=document.getElementById('bc');
  bc.innerHTML=stack.map((sid,i)=>{
    const lbl=VIEWS[sid].label;
    if(i===stack.length-1) return `<span>${lbl}</span>`;
    return `<a href="#" onclick="stack=stack.slice(0,${i+1});render();return false">${lbl}</a> ›`;
  }).join(' ');
  document.getElementById('back').style.display=stack.length>1?'':'none';
}
window.go=go;
render();
</script>

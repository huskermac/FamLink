<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamLink — Architecture Diagram</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 32px;
    color: #1a1a1a;
  }
  h1 { font-size: 18px; font-weight: 500; margin: 0 0 4px 0; }
  p.sub { font-size: 13px; color: #666; margin: 0 0 8px 0; }
  p.tip { font-size: 12px; color: #999; margin: 0 0 20px 0; font-style: italic; }
  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .ts { font-size: 12px; font-weight: 400; fill: #555; }
  .arr { stroke: #888; stroke-width: 1.5; fill: none; }
  .purple-fill  { fill: #EEEDFE; stroke: #534AB7; }
  .teal-fill    { fill: #E1F5EE; stroke: #0F6E56; }
  .gray-fill    { fill: #F1EFE8; stroke: #5F5E5A; }
  .purple-title { fill: #3C3489; }
  .purple-sub   { fill: #534AB7; }
  .teal-title   { fill: #085041; }
  .teal-sub     { fill: #0F6E56; }
  .gray-title   { fill: #444441; }
  .gray-sub     { fill: #5F5E5A; }
  #info {
    display: none;
    background: #f3f1e8;
    border: 1px solid #dddad0;
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 13px;
    color: #333;
    line-height: 1.5;
    max-width: 680px;
    margin: 12px 0 0 0;
  }
  #info strong { color: #1a1a1a; }
  g.hov { cursor: default; }
  @media print {
    body { padding: 16px; }
    #info { display: none !important; }
    p.tip { display: none; }
  }
</style>
</head>
<body>
<h1>FamLink — System Architecture</h1>
<p class="sub">Version 0.3 · March 2026 · CONFIDENTIAL — Dashed zones = hosting environment · Faded boxes = deferred (Phase 2/3)</p>
<p class="tip">Hover any component to see a plain-English description below the diagram.</p>

<svg width="100%" viewBox="0 0 680 548" xmlns="http://www.w3.org/2000/svg" id="diagram">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Column headers -->
<text class="ts" x="190" y="12" text-anchor="middle">FamLink infrastructure</text>
<text class="ts" x="514" y="12" text-anchor="middle">External services</text>

<!-- Clients -->
<g class="hov" onmouseenter="show('web-browser')" onmouseleave="hide()">
  <rect x="40" y="20" width="140" height="44" rx="8" stroke-width="0.5" class="gray-fill"/>
  <text class="th gray-title" x="110" y="38" text-anchor="middle">Web browser</text>
  <text class="ts gray-sub" x="110" y="54" text-anchor="middle">famlink.com — server-rendered</text>
  <title>Web browser: The website at famlink.com. Pages render on the server before reaching the browser — like ColdFusion generating HTML before sending it to the user.</title>
</g>
<g class="hov" onmouseenter="show('mobile-app')" onmouseleave="hide()">
  <rect x="220" y="20" width="140" height="44" rx="8" stroke-width="0.5" class="gray-fill"/>
  <text class="th gray-title" x="290" y="38" text-anchor="middle">Mobile app</text>
  <text class="ts gray-sub" x="290" y="54" text-anchor="middle">Expo — talks to API directly</text>
  <title>Mobile app: iOS/Android app built with Expo/React Native. Uses the same JavaScript codebase as the website but renders native mobile controls. Talks directly to the Express API.</title>
</g>

<line x1="110" y1="64" x2="110" y2="80" class="arr" marker-end="url(#arrow)"/>

<!-- Vercel zone -->
<rect x="20" y="80" width="340" height="88" rx="12" fill="none" stroke-dasharray="6 3" stroke-width="0.8" stroke="#aaa"/>
<text class="ts" x="42" y="96" style="fill:#888">Vercel (web hosting)</text>
<g class="hov" onmouseenter="show('nextjs')" onmouseleave="hide()">
  <rect x="128" y="100" width="200" height="56" rx="8" stroke-width="0.5" class="purple-fill"/>
  <text class="th purple-title" x="228" y="122" text-anchor="middle">Next.js 14</text>
  <text class="ts purple-sub" x="228" y="140" text-anchor="middle">App Router · server-side rendering</text>
  <title>Next.js 14: The server-side web layer. Handles routing and page rendering — like ColdFusion's Application.cfc combined with your .cfm templates, but for React components.</title>
</g>

<line x1="200" y1="168" x2="200" y2="180" class="arr" marker-end="url(#arrow)"/>

<!-- Railway zone -->
<rect x="20" y="180" width="340" height="210" rx="12" fill="none" stroke-dasharray="6 3" stroke-width="0.8" stroke="#aaa"/>
<text class="ts" x="42" y="198" style="fill:#888">Railway (API + database hosting)</text>
<g class="hov" onmouseenter="show('express')" onmouseleave="hide()">
  <rect x="40" y="222" width="165" height="56" rx="8" stroke-width="0.5" class="purple-fill"/>
  <text class="th purple-title" x="122" y="244" text-anchor="middle">Express API</text>
  <text class="ts purple-sub" x="122" y="260" text-anchor="middle">Node.js · every request starts here</text>
  <title>Express API: The backend engine — every request from web or mobile passes through here first. Like Application.cfc in ColdFusion: manages routing, authentication, validation, and database access.</title>
</g>
<g class="hov" onmouseenter="show('postgres')" onmouseleave="hide()">
  <rect x="40" y="294" width="140" height="56" rx="8" stroke-width="0.5" class="purple-fill"/>
  <text class="th purple-title" x="110" y="316" text-anchor="middle">PostgreSQL</text>
  <text class="ts purple-sub" x="110" y="332" text-anchor="middle">users · events · RSVPs</text>
  <title>PostgreSQL: Primary relational database. Stores all persistent data: users, families, events, RSVPs, relationships. Same concept as CF datasources — PostgreSQL is just the database engine.</title>
</g>
<g class="hov" onmouseenter="show('redis')" onmouseleave="hide()">
  <rect x="198" y="294" width="140" height="56" rx="8" stroke-width="0.5" class="purple-fill"/>
  <text class="th purple-title" x="268" y="316" text-anchor="middle">Redis</text>
  <text class="ts purple-sub" x="268" y="332" text-anchor="middle">sessions · cache · rate limits</text>
  <title>Redis: Fast in-memory data store — like ColdFusion's Application scope. Stores session tokens, AI rate limit counters, and cached API responses for instant retrieval without hitting the database.</title>
</g>

<line x1="200" y1="390" x2="200" y2="406" class="arr" marker-end="url(#arrow)"/>

<!-- GitHub Actions -->
<g class="hov" onmouseenter="show('gh-actions')" onmouseleave="hide()">
  <rect x="80" y="406" width="200" height="44" rx="8" stroke-width="0.5" class="gray-fill"/>
  <text class="th gray-title" x="180" y="424" text-anchor="middle">GitHub Actions</text>
  <text class="ts gray-sub" x="180" y="440" text-anchor="middle">auto-tests &amp; deploys on git push</text>
  <title>GitHub Actions: Automated CI/CD pipeline. When you push code to GitHub, Actions runs your test suite and deploys to Vercel and Railway automatically — no manual steps needed.</title>
</g>

<!-- Connector arrows to external services -->
<line x1="362" y1="108" x2="391" y2="108" class="arr" marker-end="url(#arrow)"/>
<line x1="362" y1="174" x2="391" y2="174" class="arr" marker-end="url(#arrow)"/>
<line x1="362" y1="228" x2="391" y2="228" class="arr" marker-end="url(#arrow)"/>
<line x1="362" y1="282" x2="391" y2="282" class="arr" marker-end="url(#arrow)"/>
<line x1="362" y1="338" x2="391" y2="338" class="arr" marker-end="url(#arrow)"/>
<line x1="362" y1="386" x2="391" y2="386" class="arr" marker-end="url(#arrow)"/>

<!-- External services -->
<g class="hov" onmouseenter="show('clerk')" onmouseleave="hide()">
  <rect x="393" y="80" width="242" height="56" rx="8" stroke-width="0.5" class="teal-fill"/>
  <text class="th teal-title" x="514" y="102" text-anchor="middle">Clerk</text>
  <text class="ts teal-sub" x="514" y="118" text-anchor="middle">sign-in · sessions · guest RSVP tokens</text>
  <title>Clerk: Handles all authentication externally — Google/Apple sign-in, session management, and the guest token system for Reluctant Members. No custom login code to write.</title>
</g>
<g class="hov" onmouseenter="show('resend')" onmouseleave="hide()">
  <rect x="393" y="152" width="242" height="44" rx="8" stroke-width="0.5" class="teal-fill"/>
  <text class="th teal-title" x="514" y="170" text-anchor="middle">Resend</text>
  <text class="ts teal-sub" x="514" y="186" text-anchor="middle">invites · digests · birthday reminders</text>
  <title>Resend: Transactional email service. Sends invitations, RSVP confirmations, birthday reminders, and weekly digests. Like cfmail in ColdFusion but as a managed service with delivery guarantees.</title>
</g>
<g class="hov" onmouseenter="show('twilio')" onmouseleave="hide()">
  <rect x="393" y="206" width="242" height="44" rx="8" stroke-width="0.5" class="teal-fill"/>
  <text class="th teal-title" x="514" y="224" text-anchor="middle">Twilio</text>
  <text class="ts teal-sub" x="514" y="240" text-anchor="middle">SMS · one-click RSVP · no account needed</text>
  <title>Twilio: SMS messaging service. Powers one-click RSVP links — family members can respond without creating an account. Critical for the Reluctant Member (Uncle Dave) persona.</title>
</g>
<g class="hov" onmouseenter="show('firebase')" onmouseleave="hide()">
  <rect x="393" y="260" width="242" height="44" rx="8" stroke-width="0.5" class="teal-fill"/>
  <text class="th teal-title" x="514" y="278" text-anchor="middle">Firebase FCM</text>
  <text class="ts teal-sub" x="514" y="294" text-anchor="middle">real-time push · iOS + Android</text>
  <title>Firebase FCM: Push notification delivery to iOS and Android. Sends real-time alerts when events are created or RSVPs received. Most valuable for Organizer and Co-Parent personas.</title>
</g>
<g class="hov" onmouseenter="show('anthropic')" onmouseleave="hide()">
  <rect x="393" y="316" width="242" height="44" rx="8" stroke-width="0.5" class="teal-fill"/>
  <text class="th teal-title" x="514" y="334" text-anchor="middle">Anthropic Claude</text>
  <text class="ts teal-sub" x="514" y="350" text-anchor="middle">primary AI · full family context injected</text>
  <title>Anthropic Claude: Primary AI model (Sonnet). Powers the FamLink assistant — your family's data (members, events, RSVPs) is injected into every request so the AI has full context before answering.</title>
</g>
<g class="hov" onmouseenter="show('openai')" onmouseleave="hide()">
  <rect x="393" y="364" width="242" height="44" rx="8" stroke-width="0.5" class="teal-fill"/>
  <text class="th teal-title" x="514" y="382" text-anchor="middle">OpenAI GPT-4o</text>
  <text class="ts teal-sub" x="514" y="398" text-anchor="middle">AI fallback · swap without code changes</text>
  <title>OpenAI GPT-4o: Fallback AI model. Used if Claude is unavailable or for faster tasks. The Vercel AI SDK means swapping models requires no application code changes.</title>
</g>

<!-- Deferred services (faded) -->
<g opacity="0.4">
  <rect x="393" y="430" width="242" height="44" rx="8" stroke-width="0.5" class="gray-fill"/>
  <text class="th gray-title" x="514" y="448" text-anchor="middle">Cloudflare R2</text>
  <text class="ts gray-sub" x="514" y="464" text-anchor="middle">Photo &amp; media storage — Phase 2</text>
</g>
<g opacity="0.4">
  <rect x="393" y="484" width="242" height="44" rx="8" stroke-width="0.5" class="gray-fill"/>
  <text class="th gray-title" x="514" y="502" text-anchor="middle">Stripe</text>
  <text class="ts gray-sub" x="514" y="518" text-anchor="middle">Subscription billing — Phase 3</text>
</g>
</svg>

<div id="info"></div>

<script>
const DESCS = {
  'web-browser': {t:'Web browser',        b:'The famlink.com website. Pages are rendered on the server before reaching the browser — similar to how ColdFusion generates HTML before sending it to the user.'},
  'mobile-app':  {t:'Mobile app',         b:'The iOS/Android app built with Expo/React Native. Uses the same JavaScript codebase as the website but renders native mobile controls. Talks directly to the Express API — the web layer is bypassed entirely.'},
  'nextjs':      {t:'Next.js 14',         b:'The server-side web layer hosted on Vercel. Handles routing and page rendering — like ColdFusion\'s Application.cfc combined with your .cfm templates, but for React components.'},
  'express':     {t:'Express API',        b:'The backend engine — every request from web or mobile passes through here first. Like Application.cfc in ColdFusion: manages routing, authentication checks, validation, and database access. Hosted on Railway.'},
  'postgres':    {t:'PostgreSQL',         b:'Your primary relational database. Stores all persistent data: users, families, events, RSVPs, relationships. Same concept as CF datasources — PostgreSQL is just the database engine. Accessed via Prisma ORM.'},
  'redis':       {t:'Redis',              b:'Fast in-memory data store — like ColdFusion\'s Application scope. Stores session tokens, AI rate limit counters (20 queries/user/day), and cached API responses for instant retrieval without hitting the database.'},
  'gh-actions':  {t:'GitHub Actions',     b:'Automated CI/CD pipeline. When you push code to GitHub, Actions runs your test suite and deploys to Vercel (web) and Railway (API) automatically — no manual deploy steps needed.'},
  'clerk':       {t:'Clerk',              b:'Handles all authentication externally: Google/Apple sign-in, session management, and the guest token system for Reluctant Members. Three separate flows with three separate secrets. No custom login code needed.'},
  'resend':      {t:'Resend',             b:'Transactional email service. Sends event invitations, RSVP confirmations, birthday reminders, and weekly digests. Like cfmail in ColdFusion but as a managed service with delivery guarantees and tracking.'},
  'twilio':      {t:'Twilio',             b:'SMS messaging service. Powers the one-click RSVP links — family members can respond without creating an account. 160-character limit means messages are short and action-focused. Critical for the Reluctant Member persona.'},
  'firebase':    {t:'Firebase FCM',       b:'Push notification delivery to iOS and Android devices. Sends real-time alerts when events are created or RSVPs received. Most valuable for Organizer and Co-Parent personas who want immediate awareness.'},
  'anthropic':   {t:'Anthropic Claude',   b:'Primary AI model (Claude Sonnet). Powers the FamLink assistant. Your family\'s data — members, relationships, upcoming events, pending RSVPs — is assembled and injected into every AI request before it processes your question.'},
  'openai':      {t:'OpenAI GPT-4o',      b:'Fallback AI model. Used if Claude is unavailable or for faster, lower-cost tasks. The Vercel AI SDK means swapping the underlying model requires no changes to your application code.'},
};
function show(key){
  const d=DESCS[key];
  if(!d) return;
  const el=document.getElementById('info');
  el.innerHTML=`<strong>${d.t}:</strong> ${d.b}`;
  el.style.display='block';
}
function hide(){
  document.getElementById('info').style.display='none';
}
</script>
</body>
</html>
